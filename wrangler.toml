name = "cf-memos"
main = "worker/src/index.ts"
compatibility_date = "2025-05-01"

[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/file/*", "/u/*", "/explore/rss.xml"]

[vars]
INSTANCE_NAME = "cfmemos"
APP_VERSION = "1.0.0"

# S3 credentials + Service Binding for proxy worker
# set via Cloudflare Dashboard → cf-memos → Settings → Bindings
# S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, S3_BUCKET, S3_REGION — as secrets/vars
# B2_PROXY — as Service Binding targeting your proxy worker

[[d1_databases]]
binding = "DB"
database_name = "cfmemos-db"
database_id = "71f6ed36-de26-4517-b7b0-455906b3fe07"

[ai]
binding = "AI"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
